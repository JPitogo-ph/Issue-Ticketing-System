services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ticketuser
      POSTGRES_PASSWORD: ticketpassword
      POSTGRES_DB: ticketdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://ticketuser:ticketpassword@postgres:5432/ticketdb
      NODE_ENV: development
    volumes:
      - ./backend:/app
      - node_modules:/app/node_modules
    command: npm run dev
    depends_on:
      - postgres

  pgadmin:
    image: dpage/pgadmin4
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      ["5050:80"]
    depends_on:
      - postgres

volumes:
  postgres_data:
  node_modules:
    